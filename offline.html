<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMChats — Offline</title>
<style>
body{font-family:'DM Sans',system-ui,sans-serif;background:#F7F5F2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.logo{font-size:22px;font-weight:800;color:#FF4D00;margin-bottom:32px}
.icon{font-size:72px;margin-bottom:20px}
h1{font-size:22px;font-weight:800;margin-bottom:10px}
p{color:#5C5752;font-size:15px;line-height:1.6;margin-bottom:28px}
button{padding:14px 32px;background:#FF4D00;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div>
  <div class="logo">MMChats</div>
  <div class="icon">📵</div>
  <h1>You're Offline</h1>
  <p>No internet connection right now.<br>Don't worry — the menu is cached and ready when you're back online!</p>
  <button onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
