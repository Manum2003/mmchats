<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MM ಚಾಟ್ಸ್ — ಮಾಲೀಕರ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans Kannada",sans-serif;background:#f0f0ea;color:#1c1c1c;max-width:500px;margin:0 auto;min-height:100vh}
.hdr{background:#1c1c1c;padding:14px 16px;position:sticky;top:0;z-index:60}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-size:15px;font-weight:700}
.sub{color:#aaa;font-size:10px;margin-top:1px}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-right:4px;animation:blink 2s ease infinite}
.fb-dot.connected{background:#60b246;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tgl-wrap{display:flex;align-items:center;gap:8px}
.tgl-lbl{font-size:12px;font-weight:700}
.tgl-lbl.open{color:#60b246}
.tgl-lbl.closed{color:#e23744}
.toggle{position:relative;width:50px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#555;border-radius:26px;transition:.3s}
.sl:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sl{background:#60b246}
input:checked+.sl:before{transform:translateX(24px)}
.alert{display:none;padding:14px 16px;align-items:center;gap:10px;cursor:pointer;position:sticky;top:60px;z-index:55}
.alert.show{display:flex;background:#e23744;color:#fff;animation:ablink .6s ease infinite alternate}
@keyframes ablink{0%{background:#e23744}100%{background:#b02030}}
.alert-txt{flex:1;font-size:14px;font-weight:700}
.alert-x{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.snd-row{background:#fff;padding:9px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0ede8}
.snd-lbl{font-size:12px;color:#666;display:flex;align-items:center;gap:5px}
.snd-btn{border:1.5px solid #e0ddd8;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans Kannada",sans-serif;background:#fff;color:#3d3d3d}
.snd-btn.on{background:#60b246;color:#fff;border-color:#60b246}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px}
.stat{background:#fff;border-radius:10px;padding:12px 8px;text-align:center}
.stat-v{font-size:22px;font-weight:700}
.stat-l{font-size:10px;color:#888;margin-top:2px}
.orders-hdr{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.orders-t{font-size:14px;font-weight:700}
.clear-btn{background:#fff0f0;border:1px solid #e23744;border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;color:#e23744;font-family:"Noto Sans Kannada",sans-serif;font-weight:600}
.olist{padding:0 11px;display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.ocard{background:#fff;border-radius:13px;border:1.5px solid #e0ddd8;overflow:hidden;transition:all .3s}
.ocard.is-new{border:2px solid #e23744;box-shadow:0 0 0 3px rgba(226,55,68,.15)}
.ocard.is-new .oh{background:#fff5f5}
.oh{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0ede8}
.oh-id{font-size:13px;font-weight:700}
.oh-time{font-size:10px;color:#888;margin-top:1px}
.ob{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;border:none}
.ob-new{background:#fff0f0;color:#e23744}
.ob-prep{background:#fff8e6;color:#d4800a}
.oc{padding:12px 13px}
.cust-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:#e23744;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.cname{font-size:13px;font-weight:700}
.cmob{font-size:13px;color:#378ADD;font-weight:700;margin-top:1px}
.caddr{font-size:11px;color:#666;margin-top:2px;line-height:1.4}
.loc-box{background:#e8f0fe;border:1px solid #85b7eb;border-radius:9px;padding:9px 12px;margin-bottom:10px}
.loc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.loc-title{font-size:10px;color:#0c447c;font-weight:700}
.loc-acc{font-size:10px;color:#666}
.loc-coords{font-size:11px;font-family:monospace;color:#1c1c1c;margin-bottom:6px}
.loc-btns{display:flex;gap:6px}
.loc-btn{flex:1;background:#4285f4;color:#fff;border:none;border-radius:7px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:3px}
.loc-btn.nav{background:#34A853}
.ibox{background:#f9f7f5;border-radius:8px;padding:9px;margin-bottom:10px}
.irow{display:flex;justify-content:space-between;font-size:12px;color:#3d3d3d;margin-bottom:3px}
.itot{display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding-top:7px;margin-top:4px;border-top:1px dashed #e0ddd8}
.acts{display:flex;gap:6px;flex-wrap:wrap}
.act{padding:9px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:"Noto Sans Kannada",sans-serif;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;flex:1}
.act-call{background:#e6f1fb;color:#0c447c}
.act-prep{background:#fff8e6;color:#d4800a}
.act-done{background:#1c1c1c;color:#fff}
.act-nav{background:#edfaf3;color:#1a7a4a}
.del-hdr{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.del-t{font-size:13px;color:#888;font-weight:600}
.del-list{padding:0 11px;display:flex;flex-direction:column;gap:6px;margin-bottom:80px}
.del-card{background:#fff;border-radius:10px;border:1px solid #c8e6c9;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;opacity:.65}
.del-inf{flex:1}
.del-nm{font-size:12px;font-weight:600}
.del-meta{font-size:10px;color:#888;margin-top:1px}
.del-amt{font-size:13px;font-weight:700;color:#1a7a4a;margin-right:8px}
.del-rm{background:#fff0f0;border:1px solid #ffcdd2;border-radius:6px;padding:4px 9px;font-size:10px;cursor:pointer;color:#e23744;font-family:"Noto Sans Kannada",sans-serif;font-weight:600}
.fbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid #e8e4df;padding:10px 16px;display:flex;gap:8px}
.fbar button{flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:"Noto Sans Kannada",sans-serif}
.btn-r{background:#e23744;color:#fff}
.btn-t{background:#1c1c1c;color:#fff}
.empty{text-align:center;padding:48px 16px;color:#aaa}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="logo"><span class="fb-dot" id="fb-dot"></span>MM ಚಾಟ್ಸ್ — ಮಾಲೀಕರ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್</div>
      <div class="sub" id="fb-status">Firebase ಸಂಪರ್ಕಿಸಲಾಗುತ್ತಿದೆ...</div>
    </div>
    <div class="tgl-wrap">
      <span class="tgl-lbl" id="slbl">...</span>
      <label class="toggle"><input type="checkbox" id="stoggle" onchange="toggleShop()"><span class="sl"></span></label>
    </div>
  </div>
</div>
<div class="alert" id="alert-bar" onclick="scrollNew()">
  <span style="font-size:22px">🔔</span>
  <span class="alert-txt" id="alert-txt">ಹೊಸ ಆರ್ಡರ್!</span>
  <button class="alert-x" onclick="event.stopPropagation();hideAlert()">×</button>
</div>
<div class="snd-row">
  <div class="snd-lbl"><span id="s-icon">🔔</span> ಆರ್ಡರ್ ಅಲರ್ಟ್ ಸೌಂಡ್</div>
  <button class="snd-btn on" id="snd-btn" onclick="toggleSnd()">ಚಾಲು ✓</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-v" id="st-t">0</div><div class="stat-l">ಇಂದಿನ ಆರ್ಡರ್</div></div>
  <div class="stat"><div class="stat-v" id="st-n" style="color:#e23744">0</div><div class="stat-l">ಹೊಸ ಆರ್ಡರ್</div></div>
  <div class="stat"><div class="stat-v" id="st-r" style="color:#60b246">₹0</div><div class="stat-l">ಇಂದಿನ ಆದಾಯ</div></div>
</div>
<div class="orders-hdr">
  <div class="orders-t">📋 ಆರ್ಡರ್‌ಗಳು</div>
  <button class="clear-btn" onclick="clearDelivered()">🗑️ Delivered ತೆಗೆಯಿರಿ</button>
</div>
<div class="olist" id="olist"></div>
<div id="del-section" style="display:none">
  <div class="del-hdr"><div class="del-t">✅ Delivered</div></div>
  <div class="del-list" id="del-list"></div>
</div>
<div class="fbar">
  <button class="btn-r" onclick="loadOrders()">🔄 ರಿಫ್ರೆಶ್</button>
  <button class="btn-t" onclick="addTest()">🧪 ಪರೀಕ್ಷಿಸಿ</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// FIREBASE CONFIG — SAME AS CUSTOMER SITE
// ═══════════════════════════════════════════════════════════════
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDpRHPQWkbKo0VNYB4DpEX6F4-Jez935Do",
  authDomain: "mmchats-34fc1.firebaseapp.com",
  databaseURL: "https://mmchats-34fc1-default-rtdb.firebaseio.com",
  projectId: "mmchats-34fc1",
  storageBucket: "mmchats-34fc1.firebasestorage.app",
  messagingSenderId: "848973433885",
  appId: "1:848973433885:web:bb92aabdd91b54c67b0af4",
  measurementId: "G-GFNY415MPP"
};

let db = null;
let soundOn = true;
let knownIds = new Set();
let alertT = null;
let allOrdersCache = {};

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  document.getElementById('fb-status').textContent = 'Firebase ಸಂಪರ್ಕಿತ — ರಿಯಲ್-ಟೈಮ್ ✅';
  document.getElementById('fb-dot').className = 'fb-dot connected';
  // REAL-TIME LISTENER — fires instantly when ANY device places order
  db.ref('orders').on('value', snap => {
    allOrdersCache = {};
    snap.forEach(child => { allOrdersCache[child.key] = child.val(); });
    renderOrders();
  });
  // Shop status listener
  db.ref('shop_status').on('value', snap => {
    const v = snap.val();
    if (v) setUI(v.open === true);
  });
} catch(e) {
  document.getElementById('fb-status').textContent = 'Firebase ಸಂಪರ್ಕ ಇಲ್ಲ — Local mode';
  loadLocalOrders();
}

// ─── SOUND ────────────────────────────────────────────────────
function playSound(){
  if(!soundOn)return;
  try{
    [[880,.0],[1046,.18],[880,.36],[1174,.54],[1046,.72]].forEach(([f,t],_,arr)=>{
      [0,1.3].forEach(repeat=>{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        arr.forEach(([freq,time])=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;
          g.gain.setValueAtTime(0,ctx.currentTime+time+repeat);
          g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+time+repeat+.03);
          g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+time+repeat+.16);
          o.start(ctx.currentTime+time+repeat);o.stop(ctx.currentTime+time+repeat+.2);
        });
      });
    });
  }catch(e){}
}
function toggleSnd(){soundOn=!soundOn;document.getElementById('snd-btn').className='snd-btn'+(soundOn?' on':'');document.getElementById('snd-btn').textContent=soundOn?'ಚಾಲು ✓':'ಬಂದ್';document.getElementById('s-icon').textContent=soundOn?'🔔':'🔕';}
function showAlert(txt){const b=document.getElementById('alert-bar');document.getElementById('alert-txt').textContent=txt;b.classList.add('show');playSound();if(alertT)clearTimeout(alertT);alertT=setTimeout(hideAlert,30000);}
function hideAlert(){document.getElementById('alert-bar').classList.remove('show');if(alertT)clearTimeout(alertT);}
function scrollNew(){hideAlert();const el=document.querySelector('.is-new');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}

// ─── SHOP TOGGLE ─────────────────────────────────────────────
function toggleShop(){
  const on=document.getElementById('stoggle').checked;
  setUI(on);
  if(db) db.ref('shop_status').set({open:on,updatedAt:Date.now()});
  else localStorage.setItem('mmchats_shop_v2',on?'1':'0');
}
function setUI(on){
  const l=document.getElementById('slbl');l.textContent=on?'OPEN':'CLOSED';l.className='tgl-lbl '+(on?'open':'closed');
  document.getElementById('stoggle').checked=on;
}
function initStatus(){
  if(!db){
    const v=localStorage.getItem('mmchats_shop_v2');
    let on;if(v!==null){on=v==='1';}else{const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));const m=d.getHours()*60+d.getMinutes();on=m>=270&&m<=1350;}
    setUI(on);
  }
}

// ─── UPDATE STATUS ────────────────────────────────────────────
function updateStatus(id, status){
  if(db){
    db.ref('orders/'+id+'/status').set(status);
  } else {
    const orders=getLocalOrders(),o=orders.find(x=>x.id===id);
    if(o){o.status=status;saveLocalOrders(orders);loadLocalOrders();}
  }
}
function deleteOrder(id){
  if(db){
    db.ref('orders/'+id).remove();
  } else {
    saveLocalOrders(getLocalOrders().filter(x=>x.id!==id));loadLocalOrders();
  }
}
function clearDelivered(){
  if(db){
    Object.values(allOrdersCache).filter(o=>o.status==='delivered').forEach(o=>db.ref('orders/'+o.id).remove());
  } else {
    saveLocalOrders(getLocalOrders().filter(o=>o.status!=='delivered'));loadLocalOrders();
  }
}

// ─── LOCAL FALLBACK ───────────────────────────────────────────
function getLocalOrders(){try{return JSON.parse(localStorage.getItem('mmchats_orders_v7')||'[]');}catch(e){return[];}}
function saveLocalOrders(o){localStorage.setItem('mmchats_orders_v7',JSON.stringify(o));}
function loadLocalOrders(){
  const all=getLocalOrders();
  allOrdersCache={};all.forEach(o=>{allOrdersCache[o.id]=o;});
  renderOrders();
}
function loadOrders(){if(!db) loadLocalOrders();}

// ─── RENDER ORDERS ────────────────────────────────────────────
function fmtTime(iso){try{return new Date(iso).toLocaleTimeString('kn-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});}catch(e){return'';}}

function renderOrders(){
  const all=Object.values(allOrdersCache).sort((a,b)=>new Date(b.time)-new Date(a.time));
  const active=all.filter(o=>o.status!=='delivered');
  const delivered=all.filter(o=>o.status==='delivered');

  // Detect NEW orders and alert
  const newOrders=active.filter(o=>!knownIds.has(o.id)&&o.status==='new');
  if(newOrders.length){
    const tot=newOrders.reduce((s,o)=>s+o.total,0);
    showAlert(`🆕 ${newOrders.length} ಹೊಸ ಆರ್ಡರ್! ₹${tot} — ತಕ್ಷಣ ತಯಾರಿ ಮಾಡಿ!`);
    newOrders.forEach(o=>knownIds.add(o.id));
  }

  const el=document.getElementById('olist');
  if(!active.length){
    el.innerHTML=`<div class="empty"><div style="font-size:48px;margin-bottom:11px">📋</div><div style="font-size:14px;font-weight:600;color:#3d3d3d">ಯಾವುದೇ ಆರ್ಡರ್ ಇಲ್ಲ</div><div style="font-size:11px;margin-top:5px;color:#bbb">ಗ್ರಾಹಕರು ಆರ್ಡರ್ ಮಾಡಿದಾಗ ತಕ್ಷಣ ತೋರಿಸುತ್ತದೆ</div></div>`;
  } else {
    el.innerHTML=active.map(renderActive).join('');
  }

  const ds=document.getElementById('del-section'),dl=document.getElementById('del-list');
  if(delivered.length){
    ds.style.display='block';
    dl.innerHTML=delivered.map(o=>`<div class="del-card"><div class="del-inf"><div class="del-nm">#${o.id} — ${o.custName||'?'}</div><div class="del-meta">${fmtTime(o.time)} · ${(o.items||[]).map(i=>i.name+'×'+i.qty).join(', ')}</div></div><div style="display:flex;align-items:center"><span class="del-amt">₹${o.total}</span><button class="del-rm" onclick="deleteOrder('${o.id}')">✕</button></div></div>`).join('');
  } else ds.style.display='none';

  updateStats(all);
}

function renderActive(o){
  const isNew=!knownIds.has(o.id)||o.status==='new';
  const bCls=o.status==='preparing'?'ob ob-prep':'ob ob-new';
  const bTxt=o.status==='preparing'?'⏳ ತಯಾರಿ':'🆕 ಹೊಸ';
  const init=(o.custName||'?').slice(0,2).toUpperCase();
  const items=(o.items||[]).map(i=>`<div class="irow"><span>${i.name} ×${i.qty}</span><span>₹${i.price*i.qty}</span></div>`).join('');
  let locBox='';
  if(o.custLat&&o.custLng){
    const mUrl=`https://www.google.com/maps?q=${o.custLat.toFixed?o.custLat.toFixed(7):o.custLat},${o.custLng.toFixed?o.custLng.toFixed(7):o.custLng}`;
    const nUrl=`https://www.google.com/maps/dir/?api=1&destination=${o.custLat},${o.custLng}`;
    const acc=o.locAcc?`±${Math.round(o.locAcc)}ಮೀ`:'';
    locBox=`<div class="loc-box"><div class="loc-hdr"><span class="loc-title">📍 ನಿಖರ GPS ಸ್ಥಳ</span><span class="loc-acc">${acc}</span></div><div class="loc-coords">${(+o.custLat).toFixed(6)}, ${(+o.custLng).toFixed(6)}</div><div class="loc-btns"><a href="${mUrl}" target="_blank" class="loc-btn">🗺️ Maps</a><a href="${nUrl}" target="_blank" class="loc-btn nav">🧭 Navigate</a></div></div>`;
  }
  const prepBtn=o.status!=='preparing'?`<button class="act act-prep" onclick="updateStatus('${o.id}','preparing')">⏳ ತಯಾರಿ</button>`:'';
  return`<div class="ocard ${isNew&&o.status==='new'?'is-new':''}" id="oc-${o.id}">
  <div class="oh"><div><div class="oh-id">#${o.id}</div><div class="oh-time">${fmtTime(o.time)}</div></div><span class="${bCls}">${bTxt}</span></div>
  <div class="oc">
    <div class="cust-row"><div class="avatar">${init}</div><div style="flex:1"><div class="cname">${o.custName||'?'}</div><div class="cmob"><a href="tel:${o.custMob}" style="color:#378ADD;text-decoration:none">📞 ${o.custMob||''}</a></div><div class="caddr">🏠 ${o.custAddr||''}</div></div></div>
    ${locBox}
    <div class="ibox">${items}<div class="itot"><span>ಡೆಲಿವರಿ</span><span>${o.delivery===0?'ಉಚಿತ':'₹'+o.delivery}</span></div><div class="itot"><span>💰 ಒಟ್ಟು</span><span style="color:#e23744">₹${o.total}</span></div></div>
    <div class="acts">
      <a href="tel:${o.custMob}" class="act act-call">📞 ಕರೆ</a>
      ${o.custLat?`<a href="https://www.google.com/maps/dir/?api=1&destination=${o.custLat},${o.custLng}" target="_blank" class="act act-nav">🧭 ಮಾರ್ಗ</a>`:''}
      ${prepBtn}
      <button class="act act-done" onclick="updateStatus('${o.id}','delivered')">✅ Delivered</button>
    </div>
  </div>
</div>`;
}

function updateStats(all){
  const today=new Date().toDateString();
  const t=all.filter(o=>new Date(o.time).toDateString()===today);
  document.getElementById('st-t').textContent=t.length;
  document.getElementById('st-n').textContent=all.filter(o=>o.status==='new').length;
  document.getElementById('st-r').textContent='₹'+t.reduce((s,o)=>s+o.total,0);
}

function addTest(){
